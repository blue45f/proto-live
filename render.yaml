# Render Blueprint — ProtoLive NestJS API (상시구동 호스트).
# 사용법: Render → New → Blueprint → 이 레포 연결 → render.yaml 자동 감지.
# sync:false 변수는 대시보드에서 입력한다.
#
# 프론트(Vercel)가 `/api`를 이 API로 프록시(vercel.json rewrite)하므로 브라우저는 단일 오리진을
# 쓴다 → 세션 쿠키/CORS가 단순해진다. API는 전역 프리픽스 `/api`를 쓴다(main.ts).
services:
  - type: web
    name: protolive-api
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter protolive-backend build
    startCommand: node apps/api/dist/src/main.js
    healthCheckPath: /api/health/ready
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Asia/Seoul
      # JSON 스토어 경로. free 플랜 디스크는 휘발성이라 재시작 시 데모 데이터가 초기화된다.
      # 영속이 필요하면 Render Disk를 /data에 마운트하고 이 값을 /data/protolive-store.json 로 바꾼다.
      - key: PROJECT_STORE_PATH
        value: /tmp/protolive-store.json
      # 세션 쿠키 서명 키 — production 부팅에 필수. Render가 자동 생성.
      - key: PROTOLIVE_SESSION_SECRET
        generateValue: true
      # 프론트(Vercel) 공개 도메인. /api 프록시는 서버사이드라 CORS가 필요 없지만,
      # 직접 호출 대비 및 명시성을 위해 Vercel 도메인 확정 후 입력한다(쉼표 구분).
      - key: CORS_ORIGINS
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: '60000'
      - key: RATE_LIMIT_MAX_REQUESTS
        value: '120'
