# ProtoLive 로컬 풀스택 실행용 Compose.
#   docker compose up --build
#   웹: http://localhost:4174   API: http://localhost:3003/api
#
# 로컬 DB 연동: API가 파일 스토어 대신 PostgreSQL 컨테이너를 사용하여 데이터를 영속합니다.
# 스키마는 API 부팅 시 자동으로 생성됩니다.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=512MB
      - -c
      - work_mem=8MB
      - -c
      - max_connections=30
      - -c
      - jit=off
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-protolive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-protolive-pass}
      POSTGRES_DB: ${POSTGRES_DB:-protolive}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-protolive} -d $${POSTGRES_DB:-protolive}']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      # pnpm 워크스페이스: 빌드 컨텍스트는 리포 ROOT여야 lockfile/workspace가 보인다.
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '3003'
      DATABASE_URL: postgresql://${POSTGRES_USER:-protolive}:${POSTGRES_PASSWORD:-protolive-pass}@db:5432/${POSTGRES_DB:-protolive}
      # 브라우저는 호스트의 localhost:4174에서 로드되므로 그 origin을 허용해야 한다.
      CORS_ORIGINS: http://localhost:4174,http://127.0.0.1:4174
      # NODE_ENV=production에서는 필수. 로컬 데모용 기본값이며 실제 배포 시 반드시 교체.
      PROTOLIVE_SESSION_SECRET: ${PROTOLIVE_SESSION_SECRET:-local-dev-only-change-me}
      RATE_LIMIT_WINDOW_MS: '60000'
      RATE_LIMIT_MAX_REQUESTS: '120'
    ports:
      - '3003:3003'
    restart: unless-stopped

  web:
    build:
      # pnpm 워크스페이스: 빌드 컨텍스트는 리포 ROOT여야 lockfile/workspace가 보인다.
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # 브라우저 번들에 박히는 빌드 타임 API 주소(호스트에서 본 API 포트).
        VITE_API_BASE_URL: http://localhost:3003/api
    ports:
      # 호스트 4174 → 컨테이너 8080(nginx-unprivileged)
      - '4174:8080'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
