# ProtoLive 정적 프론트엔드 서빙 설정 (nginx:alpine)
# SPA 라우팅: 존재하지 않는 경로는 index.html로 폴백한다.
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # 정적 자산은 장기 캐시(해시 파일명 기준), index.html은 캐시 금지
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 헬스체크용 경량 엔드포인트
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
