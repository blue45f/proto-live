<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="바이브코딩·AI로 만든 데모·프로토타입·초기 웹앱을 살아있는 채로 공유하고 커뮤니티 피드백을 받는 곳. 검증된 상위 빌드는 투자자에게 연결됩니다."
    />
    <title>ProtoLive · 바이브코딩 웹앱 공유 + 커뮤니티 피드백</title>
    <link rel="canonical" href="https://proto-live.vercel.app/" />
    <meta name="theme-color" content="#f9f7f1" />

    <!-- 브랜드 폰트: Pretendard Variable 다이내믹 서브셋 — og-card.html(og.png)과 동일 서체.
         사용 글자만 unicode-range로 내려받아 한글 전체 다운로드 없음. 버전은 og-card와 동일 핀. -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />

    <!-- Open Graph (카카오·페이스북 등 SNS 공유 미리보기) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ProtoLive" />
    <meta property="og:title" content="ProtoLive · 바이브코딩 웹앱 공유 + 커뮤니티 피드백" />
    <meta
      property="og:description"
      content="AI로 만든 데모·프로토타입·초기 빌드를 그대로 올리고 커뮤니티 피드백을 받으세요. 진짜 떠 있는 라이브 빌드만 — 검증된 상위 빌드는 투자자에게 연결됩니다."
    />
    <meta property="og:url" content="https://proto-live.vercel.app/" />
    <meta property="og:image" content="https://proto-live.vercel.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="ProtoLive — 바이브코딩으로 만든 웹앱을 살아있는 채로 공유하고 피드백받다"
    />
    <meta property="og:locale" content="ko_KR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ProtoLive · 바이브코딩 웹앱 공유 + 커뮤니티 피드백" />
    <meta
      name="twitter:description"
      content="AI로 만든 데모·프로토타입·초기 빌드를 그대로 올리고 커뮤니티 피드백을 받으세요. 검증된 상위 빌드는 투자자에게 연결됩니다."
    />
    <meta name="twitter:image" content="https://proto-live.vercel.app/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
