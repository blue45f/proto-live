<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ProtoLive">
  <defs>
    <!-- Modern tech workspace background -->
    <linearGradient id="protoBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <!-- Energetic startup gradient (emerald green to cyan) -->
    <linearGradient id="lightning" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#06b6d4" flood-opacity="0.45" />
    </filter>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#protoBg)" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="14.5" stroke="#334155" stroke-opacity="0.2" stroke-width="3"/>
  
  <!-- Glowing lightning bolt -->
  <path d="M37.5 7 L16 35.5 H28 L23.5 57 L48 22.5 H34.5 Z" fill="url(#lightning)" filter="url(#neon)" />
</svg>
