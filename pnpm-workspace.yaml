packages:
  - 'apps/*'

# pnpm 11 build-script approvals (CI on pnpm 11.4.0 fails with
# ERR_PNPM_IGNORED_BUILDS otherwise). Mirrors the sibling repos' convention.
onlyBuiltDependencies:
  - '@nestjs/core'
  - '@sentry/cli'
  - '@swc/core'
  - esbuild
  - protobufjs
  - unrs-resolver
allowBuilds:
  '@firebase/util': false
  '@nestjs/core': true
  '@sentry/cli': true
  '@swc/core': true
  esbuild: true
  protobufjs: false
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@heejun/eslint-config@4.0.0'
  - '@heejun/prettier-config@3.0.0'
  - '@heejun/deskcloud@0.1.0'

overrides:
  handlebars: '>=4.7.9'
  multer: '>=2.2.0'
  undici: '^7.28.0'
  ws: '>=8.21.0'
  form-data: '>=4.0.6'
  hono: '>=4.12.25'
  find-my-way: '>=8.2.2'
  '@fastify/middie': '>=9.3.2'
  fastify: '>=5.7.2'
  fast-uri: '>=3.1.2'
  path-to-regexp: '>=6.3.0'
  serialize-javascript: '>=7.0.3'
  piscina: '>=4.9.3'
  drizzle-orm: '>=0.45.2'
  vitest: '>=4.1.9'
  '@vitest/coverage-v8': '>=4.1.9'
  '@vitest/ui': '>=4.1.9'
  vite: '>=8.0.16'
  jspdf: '>=4.2.1'

auditConfig:
  ignoreGhsas:
    - GHSA-2p57-rm9w-gvfp
