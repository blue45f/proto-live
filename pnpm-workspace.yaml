packages:
  - 'apps/*'

# pnpm 11 build-script approvals (CI on pnpm 11.4.0 fails with
# ERR_PNPM_IGNORED_BUILDS otherwise). Mirrors the sibling repos' convention.
onlyBuiltDependencies:
  - '@nestjs/core'
  - '@sentry/cli'
  - '@swc/core'
  - esbuild
  - protobufjs
  - unrs-resolver
allowBuilds:
  '@firebase/util': false
  '@nestjs/core': true
  '@sentry/cli': true
  '@swc/core': true
  esbuild: true
  protobufjs: false
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@heejun/eslint-config@4.0.0'
  - '@heejun/prettier-config@3.0.0'
  - '@heejun/deskcloud@0.1.0'
