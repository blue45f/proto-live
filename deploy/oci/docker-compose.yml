# ProtoLive 백엔드 스택 — OCI Always-Free ARM VM 한 대에 API + Postgres + Caddy(자동 HTTPS).
# 프론트엔드는 Vercel 유지(무료 글로벌 CDN). vercel.json rewrites 가 /api/* 를 이 서버로 프록시 →
# 브라우저는 동일 출처라 CORS 가 단순해진다.
#
#   cd deploy/oci && cp .env.example .env && vi .env   # 비밀값 채우기
#   docker compose up -d --build
#
# 스키마는 API 가 부팅 시 idempotent DDL 로 자동 생성한다(별도 마이그레이션 단계 없음).

name: protolive

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # 소용량 ARM VM(≈6GB) 대상 보수적 튜닝. 데이터는 커뮤니티 리뷰·업보트·프로젝트 위주로 가볍다.
    command:
      - postgres
      - -c
      - shared_buffers=${PG_SHARED_BUFFERS:-512MB}
      - -c
      - effective_cache_size=${PG_EFFECTIVE_CACHE:-2GB}
      - -c
      - work_mem=${PG_WORK_MEM:-16MB}
      - -c
      - max_connections=${PG_MAX_CONN:-50}
      - -c
      - jit=off
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-protolive}
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}'
      POSTGRES_DB: ${POSTGRES_DB:-protolive}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # 관리/백업용으로 호스트 localhost 에만 노출(외부 미노출).
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-protolive} -d ${POSTGRES_DB:-protolive}']
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ../..
      dockerfile: deploy/oci/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # .env 의 모든 키를 컨테이너에 주입(PROTOLIVE_SESSION_SECRET·CORS_ORIGINS·RATE_LIMIT_* 등).
    env_file:
      - .env
    # DATABASE_URL 은 내부 db 서비스로 계산해 덮어쓴다(environment 가 env_file 보다 우선).
    # 내부 네트워크라 SSL 불필요(드라이버의 SSL 자동감지 정규식에 db 호스트는 매칭 안 됨).
    environment:
      NODE_ENV: production
      PORT: '3003'
      TZ: Asia/Seoul
      DATABASE_URL: 'postgres://${POSTGRES_USER:-protolive}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-protolive}'
    expose:
      - '3003'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: '${DOMAIN:?set DOMAIN (e.g. api.proto-live.example.com) in .env}'
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
